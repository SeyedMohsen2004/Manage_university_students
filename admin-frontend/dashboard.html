<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Admin Panel</a>
    <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="container mt-4">
  <h3>Dashboard</h3>
  <div id="stats" class="row mt-3"></div>

  <hr>
  <h4>Foods</h4>
  <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#addFoodModal">Add Food</button>
  <table class="table table-striped" id="foodsTable">
    <thead>
      <tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Capacity</th><th>Image</th><th>Actions</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <hr>
  <h4>Courses</h4>
  <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#addCourseModal">Add Course</button>
  <table class="table table-striped" id="coursesTable">
    <thead>
      <tr><th>ID</th><th>Name</th><th>Professor</th><th>Grade</th><th>Credits</th><th>Cost</th><th>Capacity</th><th>Actions</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <hr>
  <h4>Students</h4>
  <table class="table table-striped" id="studentsTable">
    <thead>
      <tr><th>ID</th><th>Username</th><th>Email</th><th>Balance</th><th>Food Reservations</th><th>Course Reservations</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <hr>
  <h4>All Reservations</h4>
  <table class="table table-striped" id="reservationsTable">
    <thead>
      <tr><th>Type</th><th>Student</th><th>Item</th><th>Price Paid</th><th>Date</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- Modal Add Food -->
<div class="modal fade" id="addFoodModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5>Add Food</h5>
      <form id="addFoodForm">
        <input class="form-control mb-2" id="foodName" placeholder="Food Name" required>
        <input class="form-control mb-2" id="foodCategory" placeholder="Category" required>
        <input class="form-control mb-2" type="number" id="foodPrice" placeholder="Price" required>
        <input class="form-control mb-2" type="number" id="foodCapacity" placeholder="Capacity" required>
        <input class="form-control mb-2" type="file" id="foodImage" accept="image/*" required>
        <button class="btn btn-primary w-100" type="submit">Add Food</button>
      </form>
    </div>
  </div>
</div>

<!-- Modal Add Course -->
<div class="modal fade" id="addCourseModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5>Add Course</h5>
      <form id="addCourseForm">
        <input class="form-control mb-2" id="courseName" placeholder="Course Name" required>
        <input class="form-control mb-2" id="courseProfessor" placeholder="Professor" required>
        <input class="form-control mb-2" id="courseGrade" placeholder="Grade" required>
        <input class="form-control mb-2" type="number" id="courseCredits" placeholder="Credits" required>
        <input class="form-control mb-2" type="number" id="courseCost" placeholder="Cost" required>
        <input class="form-control mb-2" type="number" id="courseCapacity" placeholder="Capacity" required>
        <button class="btn btn-primary w-100" type="submit">Add Course</button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const token = localStorage.getItem("access");
if(!token) window.location.href = "index.html";

document.getElementById("logoutBtn").addEventListener("click", ()=>{ localStorage.clear(); window.location.href="index.html"; });

// ===================== Dashboard =====================
async function loadDashboard(){
    const res = await fetch("http://localhost:9000/api/adminpanel/dashboard/", {
        headers: {"Authorization": `Bearer ${token}`}
    });
    if(res.ok){
        const data = await res.json();
        document.getElementById("stats").innerHTML = `
            <div class="col-md-4"><div class="card p-3 shadow">Students: ${data.total_students}</div></div>
            <div class="col-md-4"><div class="card p-3 shadow">Foods: ${data.total_foods}</div></div>
            <div class="col-md-4"><div class="card p-3 shadow">Courses: ${data.total_courses}</div></div>
            <div class="col-md-4 mt-3"><div class="card p-3 shadow">Total Balance: ${data.total_student_balance}</div></div>
            <div class="col-md-4 mt-3"><div class="card p-3 shadow">Food Reservations: ${data.total_food_reservations}</div></div>
            <div class="col-md-4 mt-3"><div class="card p-3 shadow">Course Reservations: ${data.total_course_reservations}</div></div>
        `;
    }
}
loadDashboard();

// ===================== Foods =====================
async function loadFoods(){
    const res = await fetch("http://localhost:9000/api/adminpanel/foods/", {
        headers: {"Authorization": `Bearer ${token}`}
    });
    if(res.ok){
        const data = await res.json();
        const tbody = document.querySelector("#foodsTable tbody");
        tbody.innerHTML = "";
        data.forEach(food=>{
            tbody.innerHTML += `
                <tr>
                    <td>${food.id}</td>
                    <td>${food.name}</td>
                    <td>${food.category}</td>
                    <td>${food.price}</td>
                    <td>${food.capacity}</td>
                    <td>${food.imgoffood ? `<img src="http://localhost:9000${food.imgoffood}" width="50">` : ""}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="deleteFood(${food.id})">Delete</button></td>
                </tr>
            `;
        });
    }
}

document.getElementById("addFoodForm").addEventListener("submit", async e=>{
    e.preventDefault();
    const formData = new FormData();
    formData.append("name", document.getElementById("foodName").value);
    formData.append("category", document.getElementById("foodCategory").value);
    formData.append("price", document.getElementById("foodPrice").value);
    formData.append("capacity", document.getElementById("foodCapacity").value);
    formData.append("imgoffood", document.getElementById("foodImage").files[0]);

    const res = await fetch("http://localhost:9000/api/adminpanel/foods/", {
        method:"POST",
        headers: {"Authorization": `Bearer ${token}`},
        body: formData
    });
    if(res.ok){ loadFoods(); alert("Food added!"); e.target.reset(); }
    else { const err = await res.json(); alert("Failed: " + JSON.stringify(err)); }
});

async function deleteFood(id){
    if(confirm("Are you sure?")){
        const res = await fetch(`http://localhost:9000/api/adminpanel/foods/${id}/`, {
            method:"DELETE",
            headers: {"Authorization": `Bearer ${token}`}
        });
        if(res.ok){ loadFoods(); alert("Deleted"); }
    }
}

// ===================== Courses =====================
async function loadCourses(){
    const res = await fetch("http://localhost:9000/api/adminpanel/courses/", {
        headers: {"Authorization": `Bearer ${token}`}
    });
    if(res.ok){
        const data = await res.json();
        const tbody = document.querySelector("#coursesTable tbody");
        tbody.innerHTML="";
        data.forEach(c=>{
            tbody.innerHTML += `<tr>
                <td>${c.id}</td>
                <td>${c.name}</td>
                <td>${c.professor}</td>
                <td>${c.grade}</td>
                <td>${c.credits}</td>
                <td>${c.cost}</td>
                <td>${c.capacity}</td>
                <td><button class="btn btn-sm btn-danger" onclick="deleteCourse(${c.id})">Delete</button></td>
            </tr>`;
        });
    }
}

document.getElementById("addCourseForm").addEventListener("submit", async e=>{
    e.preventDefault();
    const formData = new FormData();
    formData.append("name", document.getElementById("courseName").value);
    formData.append("professor", document.getElementById("courseProfessor").value);
    formData.append("grade", document.getElementById("courseGrade").value);
    formData.append("credits", document.getElementById("courseCredits").value);
    formData.append("cost", document.getElementById("courseCost").value);
    formData.append("capacity", document.getElementById("courseCapacity").value);

    const res = await fetch("http://localhost:9000/api/adminpanel/courses/", {
        method:"POST",
        headers: {"Authorization": `Bearer ${token}`},
        body: formData
    });
    if(res.ok){ loadCourses(); alert("Course added!"); e.target.reset(); }
    else { const err = await res.json(); alert("Failed: " + JSON.stringify(err)); }
});

async function deleteCourse(id){
    if(confirm("Are you sure?")){
        const res = await fetch(`http://localhost:9000/api/adminpanel/courses/${id}/`, {
            method:"DELETE",
            headers: {"Authorization": `Bearer ${token}`}
        });
        if(res.ok){ loadCourses(); alert("Deleted"); }
    }
}

// ===================== Students =====================
async function loadStudents(){
    const res = await fetch("http://localhost:9000/api/adminpanel/students/", {
        headers: {"Authorization": `Bearer ${token}`}
    });
    if(res.ok){
        const data = await res.json();
        const tbody = document.querySelector("#studentsTable tbody");
        tbody.innerHTML="";
        data.forEach(s=>{
            const foodRes = s.food_reservations.map(f=>f.food).join(", ");
            const courseRes = s.course_reservations.map(c=>c.course).join(", ");
            tbody.innerHTML += `<tr>
                <td>${s.id}</td>
                <td>${s.username}</td>
                <td>${s.email}</td>
                <td>${s.amount}</td>
                <td>${foodRes}</td>
                <td>${courseRes}</td>
            </tr>`;
        });
    }
}

// ===================== Reservations =====================
async function loadReservations(){
    const res = await fetch("http://localhost:9000/api/adminpanel/reservations/", {
        headers: {"Authorization": `Bearer ${token}`}
    });
    if(res.ok){
        const data = await res.json();
        const tbody = document.querySelector("#reservationsTable tbody");
        tbody.innerHTML="";
        data.food_reservations.forEach(f=>{
            tbody.innerHTML += `<tr>
                <td>Food</td><td>${f.student}</td><td>${f.food}</td><td>${f.price_paid}</td><td>${f.created_at}</td>
            </tr>`;
        });
        data.course_reservations.forEach(c=>{
            tbody.innerHTML += `<tr>
                <td>Course</td><td>${c.student}</td><td>${c.course}</td><td>${c.price_paid}</td><td>${c.created_at}</td>
            </tr>`;
        });
    }
}

// ===================== Load All =====================
loadFoods();
loadCourses();
loadStudents();
loadReservations();
</script>
</body>
</html>
